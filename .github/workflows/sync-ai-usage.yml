name: Daily AI Usage Sync

# 매일 KST 새벽 5시 (UTC 20:00) 에 Anthropic / OpenAI 사용량을 ai_usage 테이블에 동기화한다.
# 운영 엔드포인트(/api/admin/sync-ai-usage) 가 SYNC_TOKEN 으로 보호돼야 함.
#
# 필요한 GitHub Secrets:
#   - SYNC_URL    : 예) https://webapp.pages.dev/api/admin/sync-ai-usage
#   - SYNC_TOKEN  : 운영 환경 secret 과 동일한 값 (wrangler pages secret put SYNC_TOKEN)
#
# 수동 실행도 가능 (workflow_dispatch).

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: '백필 일수 (기본 7, 최대 90)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          DAYS: ${{ github.event.inputs.days || '7' }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$SYNC_TOKEN" ]; then
            echo "::error::SYNC_URL / SYNC_TOKEN GitHub Secrets 가 설정되지 않았습니다"
            exit 1
          fi
          response=$(curl -sS -w '\n%{http_code}' -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $SYNC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"days\": $DAYS}")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::sync 호출 실패 (HTTP $status)"
            exit 1
          fi
